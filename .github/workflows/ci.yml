name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        run: go build ./...

      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files are not formatted:"
            echo "$files"
            exit 1
          fi

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Vet
        run: go vet ./...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.22'
          cache: true

      - name: Install scanner binaries
        run: bash .github/scripts/install-integration-scanners.sh

      - name: Run integration tests
        run: go test -tags integration -v ./integration/...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests with coverage
        run: |
          go test -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          awk -v cov="${COVERAGE}" 'BEGIN { if (cov+0 >= 90) exit 0; exit 1 }' || {
            echo "Coverage ${COVERAGE}% is below 90% threshold"
            exit 1
          }

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Upload to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          file: coverage.out
          fail_ci_if_error: false

  scan:
    name: Muninn Security Scan
    runs-on: ubuntu-latest
    needs: coverage
    permissions:
      contents: read
      security-events: write   # for uploading SARIF to GitHub Security tab
      pull-requests: write     # for posting PR review comments
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run Muninn
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: critical
          output: json,sarif,comment

      - name: Upload SARIF results
        if: always() && hashFiles('muninn.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: muninn.sarif
