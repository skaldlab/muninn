name: CI

on:
  pull_request:

permissions:
  contents: read
  security-events: write   # for uploading SARIF to GitHub Security tab
  pull-requests: write      # for posting PR review comments

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Vet
        run: go vet ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests with coverage
        run: |
          go test -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover \
            -func=coverage.out | \
            grep total | \
            awk '{print $3}' | \
            sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 90% threshold"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
          fail_ci_if_error: false

  scan:
    name: Muninn Security Scan
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - uses: actions/checkout@v6

      - name: Run Muninn
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: critical
          output: json,sarif,comment

      - name: Upload SARIF results
        if: always() && hashFiles('muninn.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: muninn.sarif
