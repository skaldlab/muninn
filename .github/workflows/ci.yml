name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files are not formatted:"
            echo "$files"
            exit 1
          fi

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Vet
        run: go vet ./...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install scanner binaries
        run: bash .github/scripts/install-integration-scanners.sh

      - name: Run integration tests
        run: go test -tags integration -v ./integration/...

      # Issue #27 evidence: run only the two SCA scanners (osv-scanner + trivy)
      # against the fixture's lodash lockfile and surface the merged, cross-scanner
      # findings as a job summary + downloadable report.
      - name: Cross-scanner dedup evidence (issue #27)
        if: always()
        run: |
          go build -o /tmp/muninn .
          cat > /tmp/dedup.yml <<'EOF'
          version: 1
          fail-on: critical
          scanners:
            gitleaks: { enabled: false }
            zizmor: { enabled: false }
            actionlint: { enabled: false }
            semgrep: { enabled: false }
            checkov: { enabled: false }
            poutine: { enabled: false }
            osv-scanner: { enabled: true }
            trivy: { enabled: true, ignore-unfixed: true }
          EOF
          /tmp/muninn --target testdata/fixture-repo --config /tmp/dedup.yml --output json || true
          {
            echo "## Cross-scanner deduplication — issue #27"
            echo
            echo "Real \`osv-scanner\` + \`trivy\` run against \`testdata/fixture-repo\` (a \`lodash\` lockfile both scanners flag)."
            echo
            echo "- Findings after dedup: **$(jq '.findings | length' muninn.json)**"
            echo "- Findings reported by more than one scanner (merged): **$(jq '[.findings[] | select(.detected_by != null)] | length' muninn.json)**"
            echo
            echo "| Advisory (rule_id) | Aliases | Severity | Package | Detected by |"
            echo "|---|---|---|---|---|"
            jq -r '.findings[] | select(.detected_by != null) | "| \(.rule_id) | \((.metadata.aliases // []) | join(", ")) | \(.severity) | \(.metadata.package // .metadata.pkg_name // "-") | \(.detected_by | join(", ")) |"' muninn.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dedup evidence report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dedup-evidence
          path: muninn.json

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: |
          go test -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          awk -v cov="${COVERAGE}" 'BEGIN { if (cov+0 >= 90) exit 0; exit 1 }' || {
            echo "Coverage ${COVERAGE}% is below 90% threshold"
            exit 1
          }

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.out

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          file: coverage.out
          fail_ci_if_error: false

  scan:
    name: Muninn Security Scan
    runs-on: ubuntu-latest
    needs: coverage
    permissions:
      contents: read
      security-events: write   # for uploading SARIF to GitHub Security tab
      pull-requests: write     # for posting PR review comments
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run Muninn
        id: muninn
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: info
          format: sarif,comment

      - name: Upload SARIF results
        if: always() && hashFiles('muninn.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: muninn.sarif
