name: Scanner Checksums

# Enforce that the Dockerfile's hardcoded scanner SHA256 sums stay in sync with
# the pinned ARG <TOOL>_VERSION values. Fails when a version was bumped without
# refreshing its checksum (e.g. a Renovate PR on Mend-hosted Renovate, where the
# postUpgradeTasks auto-refresh is not available). Fix with:
#   make scanner-checksums-write

on:
  pull_request:
    paths:
      - Dockerfile
      - scripts/update_scanner_checksums.py
      - .github/workflows/scanner-checksums.yml

permissions:
  contents: read

jobs:
  verify:
    name: Verify pinned checksums
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Verify scanner checksums match pinned versions
        run: python3 scripts/update_scanner_checksums.py
