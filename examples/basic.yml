name: Muninn Security Scan
on:
  pull_request:
  push:
    branches: [main]

jobs:
  muninn:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: skaldlab/muninn@v1
        id: muninn
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: high
          format: sarif,comment

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.muninn.outputs.sarif-path }}
        if: always()

      - name: Summary
        run: |
          echo "Found ${{ steps.muninn.outputs.findings-count }} issues"
          echo "Critical: ${{ steps.muninn.outputs.critical-count }}"
        if: always()
