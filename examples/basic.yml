name: Muninn Security Scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Muninn
        uses: skaldlab/muninn@v1
        with:
          # GitHub token — needed for PR comments and SARIF upload.
          # The default ${{ github.token }} works for most repos.
          token: ${{ secrets.GITHUB_TOKEN }}

          # Fail the check if any finding at this severity or higher is found.
          # Options: critical | high | medium | low
          fail-on: high

          # Optional: point to a custom config file.
          # config: .github/muninn.yml

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: muninn.sarif
