name: 'Muninn Security Scanner'
description: 'All-in-one security scanner for your codebase and CI/CD pipelines by Skald Lab'
author: 'Skald Lab'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  token:
    description: 'GitHub token for posting PR comments and uploading SARIF results'
    required: true
    default: ${{ github.token }}
  fail-on:
    description: 'Minimum severity to fail the check (critical/high/medium/low)'
    required: false
    default: 'critical'
  config:
    description: 'Path to muninn.yml config file relative to repository root'
    required: false
    default: 'muninn.yml'
  format:
    description: 'Output format (sarif, json, comment, sarif,json)'
    required: false
    default: 'sarif,comment'
  output:
    description: 'Optional SARIF output path override (default muninn.sarif in workspace)'
    required: false
    default: ''
  target:
    description: 'Path to repository root to scan (default: repo root)'
    required: false
    default: '.'

outputs:
  findings-count:
    description: 'Total number of findings'
  critical-count:
    description: 'Number of critical findings'
  high-count:
    description: 'Number of high findings'
  medium-count:
    description: 'Number of medium findings'
  low-count:
    description: 'Number of low findings'
  sarif-path:
    description: 'Path to the generated SARIF report'
  json-path:
    description: 'Path to the generated JSON report'

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    GITHUB_TOKEN: ${{ inputs.token }}
    FAIL_ON: ${{ inputs.fail-on }}
    CONFIG_PATH: ${{ inputs.config }}
    OUTPUT_FORMATS: ${{ inputs.format }}
    OUTPUT_PATH: ${{ inputs.output != '' && inputs.output || 'muninn.sarif' }}
    JSON_PATH: muninn.json
    SCAN_TARGET: ${{ inputs.target }}
