version: 1
fail-on: critical
scanners:
  gitleaks:
    enabled: true
  zizmor:
    enabled: true
  actionlint:
    enabled: true
  semgrep:
    enabled: true
    rulesets:
      - p/security-audit
  osv-scanner:
    enabled: true
  trivy:
    enabled: true
    severity: [CRITICAL, HIGH]
    ignore-unfixed: true
  poutine:
    enabled: true
  checkov:
    enabled: true
