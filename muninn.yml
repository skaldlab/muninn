version: 1
fail-on: low

scanners:
  gitleaks:
    enabled: true
  zizmor:
    enabled: true
  actionlint:
    enabled: true
  poutine:
    enabled: true
  semgrep:
    enabled: true
    rulesets:
      - p/security-audit
      - p/secrets
  osv-scanner:
    enabled: true
  trivy:
    enabled: true
    severity: [CRITICAL, HIGH]
    ignore-unfixed: true
  checkov:
    enabled: true

suppressions:
  - id: testdata
    reason: >
      Intentional test fixtures (scanner sample output and integration repos).
      All secrets are fake and all vulnerabilities are deliberate.
    expires: ""
